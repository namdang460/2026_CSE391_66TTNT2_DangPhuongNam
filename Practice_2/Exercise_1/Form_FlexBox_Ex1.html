<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form_FlexBox</title>
    <link rel="stylesheet" href="Form_FlexBox_Ex1.css">
</head>
<body>
    <form>
    <div class="container">
        <h2>Get in touch with us by filling contact form below</h2>

        <div class="row">
            <input type="text" placeholder="*Enter your full name">
            <input type="email" placeholder="*Enter your email address">
        </div>

        <input type="text" placeholder="Enter your subject">

        <textarea placeholder="*Your message here..."></textarea>
        <div class="footer">
            <button type="submit" class="button_send">Send message</button>
            <span>*Please fill all required form field, thanks!</span>
        </div>
    </div>
    
</form>    
</body>
</html>
